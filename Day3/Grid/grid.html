<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0526fb;
        }

        .container {
            width: 100%;
            max-width: 100vw;
            height: 100vh;
            display: grid;

            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 245px);

            gap: 8px;

            grid-template-areas:
                "one  two   two   three"
                "one  four  five   six"
                "one  seven eight  six";
        }

        .box {
            background: #87CEEB;
            border: 2px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
        }

        .box1 { grid-area: one; background-color: rgb(0, 221, 0) }
        .box2 { grid-area: two; background-color: rgb(0, 221, 0)}
        .box3 { grid-area: three; background-color: red}
        .box4 { grid-area: four; background-color: Yellow}
        .box5 { grid-area: five; background-color: red}
        .box6 { grid-area: six; background-color: rgb(0, 221, 0)}
        .box7 { grid-area: seven; background-color: red}
        .box8 { grid-area: eight; background-color: yellow}
    </style>
</head>

<body>
    <div class="container">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
        <div class="box box5">5</div>
        <div class="box box6">6</div>
        <div class="box box7">7</div>
        <div class="box box8">8</div>
    </div>
</body>

</html>
